<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELYX | Ver Película</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#000;color:#fff;max-width:960px;margin:0 auto;padding:20px}
    h2{color:#01b4e4;margin-bottom:15px}
    .reproductor{width:100%;aspect-ratio:16/9;background:#111;border-radius:8px;overflow:hidden;margin-bottom:20px}
    video{width:100%;height:100%}
    .entrada{width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#fff;margin-bottom:10px}
    button{padding:10px 16px;background:#01b4e4;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer}
  </style>
</head>
<body>
  <h2 id="titulo">Cargando...</h2>
  <div class="reproductor">
    <video id="video" controls preload="metadata">
      Tu navegador no soporta reproducción de video
    </video>
  </div>
  <input type="text" id="fuente" class="entrada" placeholder="Pega aquí TU enlace .mp4 / .m3u8">
  <button onclick="cargarVideo()">Cargar mi video</button>

<script>
const API_KEY = "86694f7126511f241254f76f60820528";
const id = window.location.pathname.split("/")[3];

async function cargarDatos() {
  try {
    const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=es`);
    const datos = await res.json();
    document.getElementById("titulo").textContent = datos.title || "Sin título";
  } catch {
    document.getElementById("titulo").textContent = "ID no válido";
  }
}

function cargarVideo() {
  const src = document.getElementById("fuente").value.trim();
  if (!src) return alert("Escribe o pega tu enlace primero");
  document.getElementById("video").src = src;
}

cargarDatos();
</script>
</body>
</html>
