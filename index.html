<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELYX | Generador</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#0a0a0a;color:#fff;max-width:600px;margin:40px auto;padding:20px}
    h1{text-align:center;color:#4499ff;margin-bottom:30px}
    .grupo{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
    input,select{padding:12px;border:2px solid #222;border-radius:6px;background:#1a1f40;color:#fff;font-size:16px;width:100%}
    button{padding:12px 18px;border:none;border-radius:6px;background:#4499ff;color:#000;font-weight:bold;cursor:pointer;width:100%}
    #resultado{margin-top:25px;padding:15px;background:#1a1f40;border-radius:8px;display:none}
    .enlace{color:#4499ff;word-break:break-all;font-weight:bold;margin:10px 0;display:block}
    .ok{color:#2ecc71;margin-top:8px;display:none}
  </style>
</head>
<body>
  <h1>🔗 TELYX | Generador de Enlaces</h1>

  <div class="grupo">
    <select id="tipo">
      <option value="movie">Película</option>
      <option value="tv">Serie</option>
    </select>
    <input type="number" id="id" placeholder="ID TMDb ej: 502356">
    <input type="number" id="temp" placeholder="Temporada" style="width:48%;display:none">
    <input type="number" id="epi" placeholder="Episodio" style="width:48%;display:none">
  </div>

  <button onclick="generar()">Generar Enlace</button>

  <div id="resultado">
    <p>Tu enlace listo:</p>
    <a id="link" class="enlace" target="_blank"></a>
    <button onclick="copiar()">Copiar al portapapeles</button>
    <p id="msg" class="ok">✅ Copiado</p>
  </div>

<script>
// ✅ TU DOMINIO EXACTO
const DOMINIO = "https://telyx.vercel.app";

document.getElementById("tipo").onchange = () => {
  const esSerie = document.getElementById("tipo").value === "tv";
  document.getElementById("temp").style.display = esSerie ? "inline-block" : "none";
  document.getElementById("epi").style.display = esSerie ? "inline-block" : "none";
};

// 🎯 FUNCIÓN DE GENERACIÓN CORREGIDA
function generar() {
  const id = document.getElementById("id").value.trim();
  const tipo = document.getElementById("tipo").value;
  const temp = document.getElementById("temp").value || "1";
  const epi = document.getElementById("epi").value || "1";

  if (!id || isNaN(id)) {
    alert("⚠️ Pon un ID numérico válido");
    return;
  }

  // Construye el enlace igual que el que ya funciona
  let url;
  if (tipo === "movie") {
    url = `${DOMINIO}/play/movie/${id}`;
  } else {
    url = `${DOMINIO}/play/tv/${id}/${temp}/${epi}`;
  }

  // Muestra el enlace
  document.getElementById("link").textContent = url;
  document.getElementById("link").href = url;
  document.getElementById("resultado").style.display = "block";
}

function copiar() {
  navigator.clipboard.writeText(document.getElementById("link").textContent);
  document.getElementById("msg").style.display = "block";
  setTimeout(() => document.getElementById("msg").style.display = "none", 2500);
}
</script>
</body>
</html>
