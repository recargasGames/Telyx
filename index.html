<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELIVERSET - Generador</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body { background:#0a0e27; color:#fff; max-width:960px; margin:0 auto; padding:20px; }
    h1 { text-align:center; color:#4499ff; margin-bottom:25px; font-size:30px; }
    .grupo { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    select, input { padding:14px; border:2px solid #222b55; border-radius:8px; background:#151b40; color:#fff; font-size:17px; }
    #enlaceZona { background:#151b40; padding:18px; border-radius:8px; margin-bottom:25px; display:none; }
    .enlace { color:#44ff88; font-weight:bold; font-size:16px; word-break:break-all; margin:12px 0; padding:10px; background:#0a0e27; border-radius:6px; }
    button { padding:10px 18px; background:#2ecc71; border:none; border-radius:6px; color:#000; font-weight:bold; cursor:pointer; }
    .copiado { color:#2ecc71; margin-top:8px; display:none; font-weight:bold; }
    .reproductor { width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; margin:20px 0; overflow:hidden; display:none; }
    iframe { width:100%; height:100%; border:none; }
    .info { margin-top:20px; line-height:1.6; color:#c9d2ff; }
  </style>
</head>
<body>
  <h1>🌌 TELIVERSET</h1>

  <div class="grupo">
    <select id="tipo">
      <option value="movie">Película</option>
      <option value="tv">Serie</option>
    </select>
    <input type="number" id="id" placeholder="ID TMDb">
    <input type="number" id="temp" placeholder="Temporada" style="display:none;">
    <input type="number" id="epi" placeholder="Episodio" style="display:none;">
  </div>

  <div id="enlaceZona">
    <p>🔗 Enlace listo para publicar:</p>
    <div class="enlace" id="enlaceTexto"></div>
    <button onclick="copiarEnlace()">📋 Copiar</button>
    <p class="copiado" id="mensajeCopiado">✅ Copiado</p>
  </div>

  <div class="reproductor" id="repro">
    <iframe id="video" allowfullscreen allow="encrypted-media"></iframe>
  </div>

  <div class="info" id="infoDatos"></div>

<script>
const DOMINIO = "https://teliverset.vercel.app";
const API_KEY = "6196750b1fd09dd276a6106e75ee34f6";

document.getElementById("tipo").addEventListener("change", () => {
  const esSerie = document.getElementById("tipo").value === "tv";
  document.getElementById("temp").style.display = esSerie ? "inline-block" : "none";
  document.getElementById("epi").style.display = esSerie ? "inline-block" : "none";
  actualizar();
});

["id","temp","epi"].forEach(campo => document.getElementById(campo).addEventListener("input", actualizar));

function actualizar() {
  const tipo = document.getElementById("tipo").value;
  const id = document.getElementById("id").value.trim();
  const temp = document.getElementById("temp").value || "1";
  const epi = document.getElementById("epi").value || "1";
  if (!id || isNaN(id) || id.length < 4) { ocultar(); return; }

  let enlace, fuente;
  if (tipo === "movie") {
    enlace = `${DOMINIO}/play/movie/${id}`;
    fuente = `https://vidsrc.me/embed/movie?tmdb=${id}&lang=es`;
  } else {
    enlace = `${DOMINIO}/play/tv/${id}/${temp}/${epi}`;
    fuente = `https://vidsrc.me/embed/tv?tmdb=${id}&season=${temp}&episode=${epi}&lang=es`;
  }

  document.getElementById("enlaceTexto").textContent = enlace;
  document.getElementById("enlaceZona").style.display = "block";
  document.getElementById("video").src = fuente;
  document.getElementById("repro").style.display = "block";
  cargarInfo(tipo, id);
}

function ocultar() {
  document.getElementById("enlaceZona").style.display = "none";
  document.getElementById("repro").style.display = "none";
  document.getElementById("infoDatos").innerHTML = "";
}

function copiarEnlace() {
  navigator.clipboard.writeText(document.getElementById("enlaceTexto").textContent);
  const msg = document.getElementById("mensajeCopiado");
  msg.style.display = "block";
  setTimeout(() => msg.style.display = "none", 2000);
}

async function cargarInfo(tipo, id) {
  try {
    const res = await fetch(`https://api.themoviedb.org/3/${tipo}/${id}?api_key=${API_KEY}&language=es-ES`);
    const datos = await res.json();
    document.getElementById("infoDatos").innerHTML = `
      <h3>${datos.title || datos.name}</h3>
      <p>${datos.overview || "Sin información"}</p>
    `;
  } catch {}
}
</script>
</body>
</html>
