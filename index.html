<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELYX - Automático</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; color: #4499ff; margin-bottom: 25px; font-size: 30px; }
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    select, input { padding: 14px; border: 2px solid #222b55; border-radius: 8px; background: #151b40; color: #fff; font-size: 18px; }
    #enlaceZona { background: #151b40; padding: 15px; border-radius: 8px; margin-bottom: 25px; display: none; }
    .enlace { color: #4499ff; word-break: break-all; font-weight: bold; margin: 10px 0; display: block; font-size: 15px; }
    button { padding: 8px 15px; background: #2ecc71; border: none; border-radius: 4px; color: #000; font-weight: bold; cursor: pointer; }
    .copiado { color: #2ecc71; margin-top: 8px; display: none; }
    .reproductor { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 20px 0; border: 2px solid #222b55; overflow: hidden; display: none; }
    iframe { width: 100%; height: 100%; border: none; }
    .info { margin-top: 20px; line-height: 1.6; color: #c9d2ff; }
  </style>
</head>
<body>
  <h1>🎬 TELYX - Automático</h1>

  <div class="input-group">
    <select id="tipo">
      <option value="movie">Película</option>
      <option value="tv" selected>Serie</option>
    </select>
    <input type="number" id="id" placeholder="ID TMDb" value="1412">
    <input type="number" id="temp" placeholder="Temporada" value="1">
    <input type="number" id="epi" placeholder="Episodio" value="1">
  </div>

  <div id="enlaceZona">
    <p>🔗 Enlace listo:</p>
    <a id="enlace" class="enlace" target="_blank"></a>
    <button onclick="copiarEnlace()">Copiar enlace</button>
    <p id="mensajeCopiado" class="copiado">✅ Copiado</p>
  </div>

  <div class="reproductor" id="reproductorZona">
    <iframe id="videoFrame" allowfullscreen allow="encrypted-media; autoplay"></iframe>
  </div>

  <div class="info" id="infoPelicula"></div>

<script>
const DOMINIO = "https://telyx.vercel.app";
const API_KEY = "6196750b1fd09dd276a6106e75ee34f6";

window.addEventListener("load", actualizarTodo);
document.getElementById("tipo").addEventListener("change", actualizarTodo);
document.getElementById("id").addEventListener("input", actualizarTodo);
document.getElementById("temp").addEventListener("input", actualizarTodo);
document.getElementById("epi").addEventListener("input", actualizarTodo);

function actualizarTodo() {
  const tipo = document.getElementById("tipo").value;
  const id = document.getElementById("id").value.trim();
  const temp = document.getElementById("temp").value || "1";
  const epi = document.getElementById("epi").value || "1";

  if (!id || isNaN(id) || id.length < 4) {
    ocultarTodo();
    return;
  }

  let urlEnlace, fuenteVideo;
  if (tipo === "movie") {
    urlEnlace = `${DOMINIO}/play/movie/${id}`;
    // ✅ MISMA FUENTE ORIGINAL DE ONLYPLAY / UNLIMPLAY
    fuenteVideo = `https://multiembed.mov/?video_id=${id}&tmdb=1&lang=es&sub=es`;
  } else {
    urlEnlace = `${DOMINIO}/play/tv/${id}/${temp}/${epi}`;
    fuenteVideo = `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${temp}&e=${epi}&lang=es&sub=es`;
  }

  document.getElementById("enlace").textContent = urlEnlace;
  document.getElementById("enlace").href = urlEnlace;
  document.getElementById("enlaceZona").style.display = "block";

  document.getElementById("videoFrame").src = fuenteVideo;
  document.getElementById("reproductorZona").style.display = "block";

  cargarDatosTMDB(tipo, id);
}

function ocultarTodo() {
  document.getElementById("enlaceZona").style.display = "none";
  document.getElementById("reproductorZona").style.display = "none";
  document.getElementById("infoPelicula").innerHTML = "";
}

function copiarEnlace() {
  navigator.clipboard.writeText(document.getElementById("enlace").textContent);
  const msg = document.getElementById("mensajeCopiado");
  msg.style.display = "block";
  setTimeout(() => msg.style.display = "none", 2000);
}

async function cargarDatosTMDB(tipo, id) {
  try {
    const endpoint = tipo === "movie" ? `movie/${id}` : `tv/${id}`;
    const res = await fetch(`https://api.themoviedb.org/3/${endpoint}?api_key=${API_KEY}&language=es-ES`);
    const datos = await res.json();
    document.getElementById("infoPelicula").innerHTML = `
      <h3 style="color:#e0e8ff; margin:15px 0 8px;">${datos.title || datos.name}</h3>
      <p style="color:#c9d2ff; line-height:1.6;">${datos.overview || "Sin sinopsis disponible."}</p>
    `;
  } catch {}
}
</script>
</body>
</html>
