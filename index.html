<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELIVERSET - Generador de Enlaces</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; color: #4499ff; margin-bottom: 30px; font-size: 32px; }
    .caja { background: #151b40; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 2px solid #222b55; }
    label { display: block; margin-bottom: 10px; font-size: 18px; color: #c9d2ff; }
    input, textarea { width: 100%; padding: 14px; border: 2px solid #222b55; border-radius: 8px; background: #0a0e27; color: #fff; font-size: 16px; margin-bottom: 15px; }
    button { width: 100%; padding: 14px; background: #2ecc71; border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
    button:hover { background: #27ae60; }
    #enlaceZona { margin-top: 25px; padding: 18px; background: #0a0e27; border-radius: 8px; display: none; }
    .enlace { color: #44ff88; font-weight: bold; font-size: 16px; word-break: break-all; margin: 12px 0; }
    .copiado { color: #2ecc71; margin-top: 10px; font-weight: bold; display: none; }
    .reproductor { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin-top: 25px; overflow: hidden; display: none; }
    video { width: 100%; height: 100%; border: none; }
    .separador { text-align: center; margin: 25px 0; color: #8892cc; font-size: 18px; }
  </style>
</head>
<body>
  <h1>🌌 TELIVERSET</h1>

  <div class="caja">
    <h3 style="margin-bottom:20px; color:#4499ff;">Opción 1: Subir archivo de video</h3>
    <label>Selecciona tu película / video:</label>
    <input type="file" id="archivoVideo" accept="video/*">
    <button onclick="generarDesdeArchivo()">Generar Enlace</button>

    <div class="separador">O</div>

    <h3 style="margin-bottom:20px; color:#4499ff;">Opción 2: Pegar enlace directo del video</h3>
    <label>URL del video (MP4, etc.):</label>
    <input type="url" id="urlVideo" placeholder="https://ejemplo.com/video.mp4">
    <button onclick="generarDesdeEnlace()">Generar Enlace</button>
  </div>

  <div id="enlaceZona">
    <p>✅ Enlace listo para compartir:</p>
    <div class="enlace" id="enlaceFinal"></div>
    <button onclick="copiarEnlace()" style="width:auto; margin-top:10px;">📋 Copiar Enlace</button>
    <p class="copiado" id="mensajeCopiado">¡Copiado al portapapeles!</p>
  </div>

  <div class="reproductor" id="repro">
    <video id="videoRepro" controls controlsList="nodownload" allowfullscreen></video>
  </div>

<script>
const DOMINIO = "https://teliverset.vercel.app"; // Tu dominio

// Generar desde archivo subido
function generarDesdeArchivo() {
  const archivo = document.getElementById("archivoVideo").files[0];
  if (!archivo) { alert("Selecciona un archivo primero"); return; }

  // Crear enlace temporal del archivo
  const urlTemporal = URL.createObjectURL(archivo);
  // Generar código único para el enlace público
  const idUnico = Math.random().toString(36).substring(2, 10);

  mostrarResultado(idUnico, urlTemporal);
}

// Generar desde enlace directo
function generarDesdeEnlace() {
  const url = document.getElementById("urlVideo").value.trim();
  if (!url) { alert("Escribe o pega el enlace del video"); return; }

  const idUnico = Math.random().toString(36).substring(2, 10);
  mostrarResultado(idUnico, url);
}

// Mostrar enlace y reproductor
function mostrarResultado(id, urlVideo) {
  const enlacePublico = `${DOMINIO}/ver/${id}`;

  document.getElementById("enlaceFinal").textContent = enlacePublico;
  document.getElementById("enlaceZona").style.display = "block";

  // Cargar en reproductor
  const video = document.getElementById("videoRepro");
  video.src = urlVideo;
  document.getElementById("repro").style.display = "block";
}

// Copiar enlace
function copiarEnlace() {
  const texto = document.getElementById("enlaceFinal").textContent;
  navigator.clipboard.writeText(texto);
  const msg = document.getElementById("mensajeCopiado");
  msg.style.display = "block";
  setTimeout(() => msg.style.display = "none", 2500);
}
</script>
</body>
</html>
