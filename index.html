<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELIVERSET - Generador Universal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #4499ff; margin-bottom: 30px; font-size: 32px; }
        .caja { background: #151b40; padding: 25px; border-radius: 12px; border: 2px solid #222b55; margin-bottom: 25px; }
        label { display: block; margin-bottom: 12px; font-size: 18px; color: #c9d2ff; }
        input { width: 100%; padding: 14px; border: 2px solid #222b55; border-radius: 8px; background: #0a0e27; color: #fff; font-size: 16px; margin-bottom: 20px; }
        button { width: 100%; padding: 14px; background: #2ecc71; border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; }
        button:hover { background: #27ae60; }
        #resultado { margin-top: 25px; padding: 20px; background: #151b40; border-radius: 10px; border: 2px solid #222b55; display: none; }
        .enlace { color: #44ff88; font-weight: bold; font-size: 16px; word-break: break-all; margin: 15px 0; padding: 12px; background: #0a0e27; border-radius: 6px; }
        .copiado { color: #2ecc71; margin-top: 12px; font-weight: bold; text-align: center; display: none; }
        .reproductor { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; margin-top: 25px; overflow: hidden; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <h1>🌌 TELIVERSET</h1>

    <div class="caja">
        <label>Pega aquí el enlace de tu video:</label>
        <input type="url" id="enlaceEntrada" placeholder="https://drive.google.com / https://h5.seekee.ai / .mp4 directo">
        <button onclick="generarEnlace()">🔄 Convertir y Generar Enlace</button>
    </div>

    <div id="resultado">
        <p>✅ Enlace listo para compartir:</p>
        <div class="enlace" id="enlaceFinal"></div>
        <button onclick="copiarEnlace()" style="width: auto; padding: 10px 20px;">📋 Copiar Enlace</button>
        <p class="copiado" id="mensajeCopiado">¡Copiado correctamente!</p>
    </div>

    <div class="reproductor" id="vistaPrevia">
        <iframe id="videoPrevio" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

<script>
const DOMINIO = "https://teliverset.vercel.app";
let baseVideos = JSON.parse(localStorage.getItem("teliverset_videos")) || {};

// Convierte cualquier enlace a formato reproducible
function convertirEnlace(url) {
    if (!url) return null;

    // Google Drive
    if (url.includes("drive.google.com")) {
        const id = url.match(/[-\w]{25,}/)?.[0];
        return id ? `https://drive.google.com/file/d/${id}/preview` : null;
    }

    // Seekee
    if (url.includes("h5.seekee.ai")) {
        const id = url.split("/s/")[1]?.split("?")[0];
        return id ? `https://h5.seekee.ai/drive/embed/${id}` : null;
    }

    // Enlace directo MP4 u otro
    if (url.match(/\.(mp4|mkv|avi|mov|webm)(\?.*)?$/i)) {
        return url;
    }

    return url;
}

function generarEnlace() {
    const entrada = document.getElementById("enlaceEntrada").value.trim();
    const enlaceConvertido = convertirEnlace(entrada);

    if (!enlaceConvertido) {
        alert("Enlace no válido o no reconocido");
        return;
    }

    // Generar código único
    const codigoUnico = Math.random().toString(36).substring(2, 10);
    baseVideos[codigoUnico] = enlaceConvertido;
    localStorage.setItem("teliverset_videos", JSON.stringify(baseVideos));

    // Mostrar resultado
    const enlaceFinal = `${DOMINIO}/ver/${codigoUnico}`;
    document.getElementById("enlaceFinal").textContent = enlaceFinal;
    document.getElementById("resultado").style.display = "block";

    // Vista previa
    document.getElementById("videoPrevio").src = enlaceConvertido;
    document.getElementById("vistaPrevia").style.display = "block";
}

function copiarEnlace() {
    const texto = document.getElementById("enlaceFinal").textContent;
    navigator.clipboard.writeText(texto);
    const aviso = document.getElementById("mensajeCopiado");
    aviso.style.display = "block";
    setTimeout(() => aviso.style.display = "none", 2500);
}
</script>
</body>
</html>
