<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELYX | Generador de Enlaces</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#0a0a0a;color:#fff;max-width:600px;margin:40px auto;padding:20px}
    h1{text-align:center;color:#4499ff;margin-bottom:30px}
    .grupo{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
    input,select{padding:12px;border:2px solid #222;border-radius:6px;background:#151515;color:#fff;font-size:16px}
    button{padding:12px 18px;border:none;border-radius:6px;background:#4499ff;color:#000;font-weight:bold;cursor:pointer}
    #resultado{margin-top:25px;padding:15px;background:#151515;border-radius:8px;display:none}
    .enlace{color:#4499ff;word-break:break-all;font-weight:bold;margin:10px 0;display:block}
    .ok{color:#2ecc71;display:none}
  </style>
</head>
<body>
  <h1>🔗 TELYX | Generador</h1>
  <div class="grupo">
    <select id="tipo">
      <option value="movie">Película</option>
      <option value="tv">Serie</option>
    </select>
    <input type="number" id="id" placeholder="ID TMDb ej: 502356">
    <input type="number" id="temp" placeholder="Temp" style="width:70px;display:none">
    <input type="number" id="epi" placeholder="Ep" style="width:70px;display:none">
    <button onclick="generar()">Generar Enlace</button>
  </div>

  <!-- OPCIÓN 2: Pones TU enlace y te damos el corto -->
  <div style="margin-top:30px;padding:15px;border:1px solid #222;border-radius:8px">
    <h3>🎥 Tienes el enlace del video?</h3>
    <input type="text" id="enlaceVideo" placeholder="Pega aquí tu .mp4 / .m3u8" style="width:100%;margin:10px 0">
    <button onclick="crearEnlaceCorto()">Crear enlace propio</button>
    <div id="corto" style="margin-top:10px;display:none">
      <p>Tu enlace: <span id="miCorto" style="color:#4499ff;font-weight:bold"></span></p>
    </div>
  </div>

  <div id="resultado">
    <p>Tu enlace listo:</p>
    <a id="link" class="enlace" target="_blank"></a>
    <button onclick="copiar()">Copiar</button>
    <p id="msg" class="ok">✅ Copiado</p>
  </div>

<script>
const DOMINIO = "https://telyx.vercel.app";
document.getElementById("tipo").onchange=()=>{
  const esTV=document.getElementById("tipo").value==="tv";
  document.getElementById("temp").style.display=esTV?"inline-block":"none";
  document.getElementById("epi").style.display=esTV?"inline-block":"none";
};

// 🎯 Opción 1: Pones ID → genera tu enlace
function generar(){
  const id=document.getElementById("id").value.trim();
  const tipo=document.getElementById("tipo").value;
  const t=document.getElementById("temp").value||1;
  const e=document.getElementById("epi").value||1;
  if(!id)return alert("Ingresa ID válido");
  let url=tipo==="movie"
    ? `${DOMINIO}/play/movie/${id}`
    : `${DOMINIO}/play/tv/${id}/${t}/${e}`;
  document.getElementById("link").href=url;
  document.getElementById("link").textContent=url;
  document.getElementById("resultado").style.display="block";
}

// 🎯 Opción 2: Pones tu enlace → te damos el enlace corto
function crearEnlaceCorto(){
  const enlace=document.getElementById("enlaceVideo").value.trim();
  if(!enlace)return alert("Pega tu enlace primero");
  const idUnico = btoa(enlace).slice(0,12); // crea código único
  const url = `${DOMINIO}/v/${idUnico}`;
  document.getElementById("miCorto").textContent=url;
  document.getElementById("corto").style.display="block";
}

function copiar(){
  navigator.clipboard.writeText(document.getElementById("link").textContent);
  document.getElementById("msg").style.display="block";
}
</script>
</body>
</html>
