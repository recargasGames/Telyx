<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELYX | Reproductor Automático</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }
        h1 { color: #4499ff; font-size: 32px; margin-bottom: 10px; }
        .reproductor { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 20px 0; border: 2px solid #222b55; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .estado { color: #c0c8ff; text-align: center; padding: 40px; font-size: 17px; }
        h3 { margin: 25px 0 10px; font-size: 22px; color: #e0e8ff; }
        p { color: #c9d2ff; line-height: 1.7; text-align: justify; font-size: 16px; }
    </style>
</head>
<body>

    <h1 id="titulo">Cargando...</h1>

    <div class="reproductor" id="cajaReproductor">
        <div class="estado">Buscando reproducción automática...</div>
    </div>

    <h3>Sinopsis</h3>
    <p id="sinopsis">Obteniendo datos de TMDb...</p>

<script>
// ✅ Tu clave TMDb
const API_KEY = "6196750b1fd09dd276a6106e75ee34f6";

// Leer ID
let id;
const ruta = window.location.pathname;
const parametros = new URLSearchParams(window.location.search);

if (ruta.startsWith("/play/movie/") && ruta.split("/").length >= 4) {
    id = ruta.split("/")[3];
} else if (parametros.get("id")) {
    id = parametros.get("id");
}

async function cargarTodo() {
    if (!id || isNaN(id)) {
        document.getElementById("titulo").textContent = "ID no válido";
        document.getElementById("sinopsis").textContent = "Usa: ?id=502356";
        return;
    }

    // 1. Cargar datos de TMDb
    try {
        const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=es-ES`);
        const datos = await res.json();
        document.getElementById("titulo").textContent = datos.title;
        document.getElementById("sinopsis").textContent = datos.overview || "Sin sinopsis disponible.";
    } catch {
        document.getElementById("titulo").textContent = "Error al cargar datos";
        document.getElementById("cajaReproductor").innerHTML = `<div class="estado">No se pudo conectar</div>`;
        return;
    }

    // 2. 🎥 FUENTES AUTOMÁTICAS: funcionan en Venezuela, en español
    // Son las mismas que usan Onlyplay/Unlimplay
    const fuentes = [
        `https://multiembed.mov/?video_id=${id}&tmdb=1&lang=es`,
        `https://vidsrc.me/embed/movie?tmdb=${id}`,
        `https://embed.su/embed/movie/${id}`,
        `https://vidplay.online/embed/movie/${id}`
    ];

    let actual = 0;
    function probarFuente() {
        if (actual >= fuentes.length) {
            document.getElementById("cajaReproductor").innerHTML = `<div class="estado">No hay fuente disponible en este momento</div>`;
            return;
        }
        document.getElementById("cajaReproductor").innerHTML = `<iframe src="${fuentes[actual]}" allowfullscreen allow="encrypted-media; autoplay"></iframe>`;
        actual++;
    }

    probarFuente();
}

cargarTodo();
</script>

</body>
</html>
