<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELYX | Película</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0e27;color:#fff;font-family:Arial,sans-serif;padding:20px;max-width:960px;margin:0 auto}
    h1{color:#4499ff}
    .reproductor{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;margin:20px 0}
    video{width:100%;height:100%}
    input{width:100%;padding:12px;background:#151b40;border:1px solid #2a3470;color:#fff;border-radius:6px}
  </style>
</head>
<body>
  <h1 id="titulo">Cargando...</h1>
  <div class="reproductor">
    <video id="video" controls allowfullscreen></video>
  </div>
  <input type="text" id="fuente" placeholder="Pega aquí TU enlace .mp4 / .m3u8">
  <p id="sinopsis" style="margin-top:20px;color:#c9d2ff"></p>

<script>
const API_KEY = "86694f7126511f241254f76f60820528";
const id = window.location.pathname.split("/")[3];

async function cargar(){
  if(!id) return;
  try{
    const res=await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=es`);
    const datos=await res.json();
    document.getElementById("titulo").textContent=datos.title;
    document.getElementById("sinopsis").textContent=datos.overview;
  }catch(e){document.getElementById("titulo").textContent="ID no válido"}
}

document.getElementById("fuente").addEventListener("input",e=>{
  document.getElementById("video").src=e.target.value.trim();
});

cargar();
</script>
</body>
</html>
