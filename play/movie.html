<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELYX | Película</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }
        h1 { color: #4499ff; font-size: 32px; margin-bottom: 10px; }
        .reproductor { width: 100%; aspect-ratio: 16/9; background: #111430; border-radius: 12px; margin: 20px 0; border: 2px solid #222b55; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .aviso { color: #c0c8ff; text-align: center; padding: 30px; font-size: 17px; }
        video { width: 100%; height: 100%; border-radius: 10px; }
        .entrada { width: 100%; padding: 16px; background: #151b40; border: 1px solid #2a3470; border-radius: 8px; color: #fff; font-size: 16px; margin-bottom: 25px; }
        h3 { margin: 25px 0 10px; font-size: 22px; color: #e0e8ff; }
        p { color: #c9d2ff; line-height: 1.7; text-align: justify; font-size: 16px; }
    </style>
</head>
<body>

    <h1 id="titulo">Cargando...</h1>

    <div class="reproductor" id="cajaReproductor">
        <div class="aviso">
            Pega tu enlace .mp4 o .m3u8 en el recuadro de abajo<br>
            y la película comenzará a reproducirse automáticamente
        </div>
    </div>

    <input type="text" id="fuente" class="entrada" placeholder="👉 Pega aquí tu enlace de video .mp4 / .m3u8">

    <h3>Sinopsis</h3>
    <p id="sinopsis">Obteniendo información...</p>

<script>
// ✅ Tu clave propia de TMDb
const API_KEY = "6196750b1fd09dd276a6106e75ee34f6";

// 🛠️ Leer ID de forma segura
let id;
const ruta = window.location.pathname;
const parametros = new URLSearchParams(window.location.search);

if (ruta.startsWith("/play/movie/") && ruta.split("/").length >= 4) {
    id = ruta.split("/")[3];
} else if (parametros.get("id")) {
    id = parametros.get("id");
}

async function cargarDatos() {
    if (!id || isNaN(id)) {
        document.getElementById("titulo").textContent = "ID no válido";
        document.getElementById("sinopsis").textContent = "Usa: /play/movie/ID o ?id=502356";
        return;
    }

    try {
        const respuesta = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=es-ES`);
        if (!respuesta.ok) throw new Error();
        const datos = await respuesta.json();
        
        document.getElementById("titulo").textContent = datos.title;
        document.getElementById("sinopsis").textContent = datos.overview || "Sin sinopsis disponible.";
    } catch {
        document.getElementById("titulo").textContent = "ID no encontrado";
        document.getElementById("sinopsis").textContent = "Verifica el número en TheMovieDB.";
    }
}

// 🎥 Reproducción al pegar enlace
document.getElementById("fuente").addEventListener("input", () => {
    const enlace = document.getElementById("fuente").value.trim();
    if (enlace) {
        document.getElementById("cajaReproductor").innerHTML = `<video src="${enlace}" controls preload="metadata" allowfullscreen></video>`;
    } else {
        document.getElementById("cajaReproductor").innerHTML = `<div class="aviso">Pega tu enlace .mp4 o .m3u8 aquí abajo</div>`;
    }
});

cargarDatos();
</script>

</body>
</html>
