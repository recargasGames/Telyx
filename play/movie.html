<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELYX | Película</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }
        h1 { color: #4499ff; font-size: 32px; margin-bottom: 10px; }
        .reproductor { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 20px 0; border: 2px solid #222b55; overflow: hidden; }
        iframe, video { width: 100%; height: 100%; border: none; }
        .entrada { width: 100%; padding: 14px; background: #151b40; border: 1px solid #2a3470; border-radius: 8px; color: #fff; font-size: 16px; margin-bottom: 20px; }
        h3 { margin: 25px 0 10px; font-size: 22px; }
        p { color: #c9d2ff; line-height: 1.6; text-align: justify; }
    </style>
</head>
<body>

    <h1 id="titulo">Cargando...</h1>
    <div class="reproductor">
        <iframe id="iframeVideo" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <input type="text" id="fuente" class="entrada" placeholder="Opcional: Pega tu enlace .mp4 / .m3u8">
    <h3>Sinopsis</h3>
    <p id="sinopsis">Obteniendo datos...</p>

<script>
// ✅ Tu clave TMDb
const API_KEY = "6196750b1fd09dd276a6106e75ee34f6";

// 🛠️ LECTURA DE ID SEGURA: funciona por ruta O por ?id=
let id;
const ruta = window.location.pathname;
const params = new URLSearchParams(window.location.search);

if (ruta.startsWith("/play/movie/") && ruta.split("/").length >= 4) {
    id = ruta.split("/")[3];
} else if (params.get("id")) {
    id = params.get("id");
}

async function cargarTodo() {
    if (!id || isNaN(id)) {
        document.getElementById("titulo").textContent = "ID no válido";
        document.getElementById("sinopsis").textContent = "Usa: /play/movie/ID o ?id=ID";
        return;
    }

    // Cargar datos de TMDb
    try {
        const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=es-ES`);
        if (!res.ok) throw new Error();
        const datos = await res.json();
        document.getElementById("titulo").textContent = datos.title;
        document.getElementById("sinopsis").textContent = datos.overview || "Sin sinopsis disponible.";
    } catch {
        document.getElementById("titulo").textContent = "ID no existe";
        document.getElementById("sinopsis").textContent = "Verifica el número en TMDb.";
        return;
    }

    // 🎥 Reproducción automática
    document.getElementById("iframeVideo").src = `https://vidsrc.xyz/embed/movie/${id}?lang=es`;
}

// Reproducción con tu propio enlace
document.getElementById("fuente").addEventListener("input", () => {
    const enlace = document.getElementById("fuente").value.trim();
    if (enlace) {
        document.querySelector(".reproductor").innerHTML = `<video src="${enlace}" controls preload="metadata" allowfullscreen></video>`;
    }
});

cargarTodo();
</script>

</body>
</html>
