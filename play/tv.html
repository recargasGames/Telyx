<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELYX | Serie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }

        h1 { color: #4499ff; font-size: 32px; margin-bottom: 5px; }
        .capitulo { color: #88aaff; font-size: 20px; margin-bottom: 10px; }
        .info { color: #c0c8ff; font-size: 18px; margin-bottom: 20px; }

        .reproductor {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            border: 2px solid #222b55;
            overflow: hidden;
            margin-bottom: 20px;
        }
        video { width: 100%; height: 100%; background: #000; }

        .entrada {
            width: 100%;
            padding: 14px;
            background: #151b40;
            border: 1px solid #2a3470;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 25px;
        }

        h3 { font-size: 22px; margin-bottom: 10px; }
        p { color: #c9d2ff; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>Título de la serie</h1>
    <p class="capitulo">Temporada 1 • Episodio 1</p>
    <p class="info">Calidad HD | Español Latino</p>

    <div class="reproductor">
        <video id="video" controls preload="metadata" allowfullscreen>
            Tu navegador no soporta reproducción de video.
        </video>
    </div>

    <input type="text" id="fuente" class="entrada" placeholder="👉 Pega aquí tu enlace .mp4 o .m3u8">

    <h3>Sinopsis</h3>
    <p>Plataforma propia. Solo pega el enlace de tu video y se reproducirá al instante. Sin complicaciones, sin servicios externos.</p>

<script>
    const campo = document.getElementById("fuente");
    const video = document.getElementById("video");

    campo.addEventListener("input", () => {
        const enlace = campo.value.trim();
        if (enlace) {
            video.src = enlace;
            video.load();
        }
    });
</script>

</body>
</html>
