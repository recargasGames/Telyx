<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELYX | Serie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }
        h1 { color: #4499ff; font-size: 32px; margin-bottom: 5px; }
        .info { color: #88aaff; font-size: 18px; margin-bottom: 15px; }
        .reproductor { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 20px 0; border: 2px solid #222b55; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        h3 { margin: 25px 0 10px; font-size: 22px; color: #e0e8ff; }
        p { color: #c9d2ff; line-height: 1.7; text-align: justify; font-size: 16px; }
    </style>
</head>
<body>

    <h1 id="titulo">Cargando...</h1>
    <p class="info" id="tempEp"></p>

    <div class="reproductor">
        <iframe id="videoFrame" allowfullscreen allow="encrypted-media; autoplay"></iframe>
    </div>

    <h3>Sinopsis</h3>
    <p id="sinopsis">Obteniendo datos...</p>

<script>
const API_KEY = "6196750b1fd09dd276a6106e75ee34f6";
const partes = window.location.pathname.split("/");
const id = partes[3];
const temp = partes[4] || "1";
const epi = partes[5] || "1";

async function cargarTodo() {
  if (!id || isNaN(id)) {
    document.getElementById("titulo").textContent = "ID no válido";
    return;
  }

  try {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=es-ES`);
    const datos = await res.json();
    document.getElementById("titulo").textContent = datos.name;
    document.getElementById("tempEp").textContent = `Temporada ${temp} • Episodio ${epi}`;
    document.getElementById("sinopsis").textContent = datos.overview || "Sin sinopsis disponible";
  } catch {
    document.getElementById("titulo").textContent = "Error al cargar";
  }

  document.getElementById("videoFrame").src = `https://vidsrc.me/embed/tv?tmdb=${id}&season=${temp}&episode=${epi}`;
}
cargarTodo();
</script>

</body>
</html>
