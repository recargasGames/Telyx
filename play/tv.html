<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELIVERSET | Serie</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body { background:#0a0e27; color:#fff; max-width:960px; margin:0 auto; padding:20px; }
    h1 { color:#4499ff; font-size:28px; margin-bottom:5px; }
    .info { color:#88aaff; margin-bottom:15px; }
    .reproductor { width:100%; aspect-ratio:16/9; background:#000; border-radius:10px; margin:20px 0; overflow:hidden; }
    iframe { width:100%; height:100%; border:none; }
    h3 { margin:25px 0 8px; color:#e0e8ff; }
    p { color:#c9d2ff; line-height:1.6; }
  </style>
</head>
<body>
  <h1 id="titulo">Cargando...</h1>
  <p class="info" id="tempEp"></p>
  <div class="reproductor">
    <iframe id="video" allowfullscreen allow="encrypted-media"></iframe>
  </div>
  <h3>Sinopsis</h3>
  <p id="sinopsis">Cargando...</p>

<script>
const API_KEY = "6196750b1fd09dd276a6106e75ee34f6";
const partes = window.location.pathname.split("/");
const id = partes[3];
const temp = partes[4] || "1";
const epi = partes[5] || "1";

async function cargar() {
  if (!id || isNaN(id)) { document.getElementById("titulo").textContent = "ID inválido"; return; }
  try {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=es-ES`);
    const datos = await res.json();
    document.getElementById("titulo").textContent = datos.name;
    document.getElementById("tempEp").textContent = `Temporada ${temp} • Episodio ${epi}`;
    document.getElementById("sinopsis").textContent = datos.overview || "Sin información";
  } catch { document.getElementById("titulo").textContent = "Error al cargar"; }

  const fuentes = [
    `https://vidsrc.me/embed/tv?tmdb=${id}&season=${temp}&episode=${epi}&lang=es`,
    `https://vidsrc.in/embed/tv?tmdb=${id}&s=${temp}&e=${epi}&lang=es`,
    `https://embed.su/embed/tv/${id}/${temp}/${epi}?lang=es`
  ];
  let i = 0;
  function probar() { if (i < fuentes.length) { document.getElementById("video").src = fuentes[i]; i++; } }
  probar();
}
cargar();
</script>
</body>
</html>
