<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELYX | Reproductor Series</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }
        h1 { color: #4499ff; font-size: 32px; margin-bottom: 5px; }
        .info { color: #88aaff; font-size: 18px; margin-bottom: 15px; }
        .reproductor { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 20px 0; border: 2px solid #222b55; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .aviso { color: #c0c8ff; text-align: center; padding: 30px; font-size: 17px; }
        video { width: 100%; height: 100%; border-radius: 10px; background: #000; }
        .entrada { width: 100%; padding: 16px; background: #151b40; border: 1px solid #2a3470; border-radius: 8px; color: #fff; font-size: 16px; margin-bottom: 25px; }
        h3 { margin: 25px 0 10px; font-size: 22px; color: #e0e8ff; }
        p { color: #c9d2ff; line-height: 1.7; text-align: justify; font-size: 16px; }
    </style>
</head>
<body>

    <h1 id="titulo">Cargando información...</h1>
    <p class="info" id="tempEp"></p>

    <div class="reproductor" id="cajaReproductor">
        <div class="aviso">
            Reproductor propio sin anuncios<br>
            Pega tu enlace .mp4 / .m3u8 aquí abajo
        </div>
    </div>

    <input type="text" id="fuente" class="entrada" placeholder="👉 Pega aquí tu enlace de video limpio">

    <h3>Sinopsis</h3>
    <p id="sinopsis">Obteniendo datos de TMDb...</p>

<script>
const API_KEY = "6196750b1fd09dd276a6106e75ee34f6";

let id, temp, epi;
const ruta = window.location.pathname;
const parametros = new URLSearchParams(window.location.search);

if (ruta.startsWith("/play/tv/") && ruta.split("/").length >= 6) {
    const partes = ruta.split("/");
    id = partes[3];
    temp = partes[4] || "1";
    epi = partes[5] || "1";
} else if (parametros.get("id")) {
    id = parametros.get("id");
    temp = parametros.get("t") || "1";
    epi = parametros.get("e") || "1";
}

async function cargarDatos() {
    if (!id || isNaN(id)) {
        document.getElementById("titulo").textContent = "ID no válido";
        document.getElementById("sinopsis").textContent = "Usa: /play/tv/ID/1/1 o ?id=ID&t=1&e=1";
        return;
    }

    try {
        const respuesta = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=es-ES`);
        if (!respuesta.ok) throw new Error();
        const datos = await respuesta.json();
        document.getElementById("titulo").textContent = datos.name;
        document.getElementById("tempEp").textContent = `Temporada ${temp} • Episodio ${epi}`;
        document.getElementById("sinopsis").textContent = datos.overview || "Sin sinopsis disponible.";
    } catch {
        document.getElementById("titulo").textContent = "ID no encontrado";
        document.getElementById("sinopsis").textContent = "Verifica el número en TMDb.";
    }
}

document.getElementById("fuente").addEventListener("input", () => {
    const enlace = document.getElementById("fuente").value.trim();
    if (enlace) {
        document.getElementById("cajaReproductor").innerHTML = `
            <video src="${enlace}" controls preload="metadata" allowfullscreen>
                Tu navegador no soporta reproducción
            </video>
        `;
    } else {
        document.getElementById("cajaReproductor").innerHTML = `
            <div class="aviso">Pega tu enlace .mp4 o .m3u8 aquí abajo</div>
        `;
    }
});

cargarDatos();
</script>

</body>
</html>
