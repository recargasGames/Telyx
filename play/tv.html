<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELYX | Serie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0e27; color: #ffffff; max-width: 960px; margin: 0 auto; padding: 20px; }
        h1 { color: #4499ff; font-size: 32px; margin-bottom: 5px; }
        .info { color: #88aaff; font-size: 18px; margin-bottom: 15px; }
        .reproductor { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 20px 0; border: 2px solid #222b55; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .estado { text-align: center; padding: 40px; color: #c0c8ff; font-size: 16px; }
        h3 { margin: 25px 0 10px; font-size: 22px; color: #e0e8ff; }
        p { color: #c9d2ff; line-height: 1.7; text-align: justify; font-size: 16px; }
    </style>
</head>
<body>

    <h1 id="titulo">Cargando...</h1>
    <p class="info" id="tempEp"></p>

    <div class="reproductor" id="cajaReproductor">
        <div class="estado">Conectando reproductor...</div>
    </div>

    <h3>Sinopsis</h3>
    <p id="sinopsis">Obteniendo información...</p>

<script>
const API_KEY = "6196750b1fd09dd276a6106e75ee34f6";

let id, temp, epi;
const ruta = window.location.pathname;
const parametros = new URLSearchParams(window.location.search);

if (ruta.startsWith("/play/tv/") && ruta.split("/").length >= 6) {
    const partes = ruta.split("/");
    id = partes[3];
    temp = partes[4] || "1";
    epi = partes[5] || "1";
} else if (parametros.get("id")) {
    id = parametros.get("id");
    temp = parametros.get("t") || "1";
    epi = parametros.get("e") || "1";
}

async function cargarTodo() {
    if (!id || isNaN(id)) {
        document.getElementById("titulo").textContent = "ID no válido";
        document.getElementById("sinopsis").textContent = "Usa: /play/tv/ID/1/1 o ?id=ID&t=1&e=1";
        document.getElementById("cajaReproductor").innerHTML = `<div class="estado">Ingresa un ID válido de TMDb</div>`;
        return;
    }

    try {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=es-ES`);
        if (!res.ok) throw new Error();
        const datos = await res.json();
        document.getElementById("titulo").textContent = datos.name;
        document.getElementById("tempEp").textContent = `Temporada ${temp} • Episodio ${epi}`;
        document.getElementById("sinopsis").textContent = datos.overview || "Sin sinopsis disponible.";
    } catch {
        document.getElementById("titulo").textContent = "ID no existe";
        document.getElementById("sinopsis").textContent = "Verifica el número en TheMovieDB.";
        document.getElementById("cajaReproductor").innerHTML = `<div class="estado">No se encontró información</div>`;
        return;
    }

    const fuentes = [
        `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${temp}&e=${epi}&lang=es&autoplay=1`,
        `https://embed.su/embed/tv/${id}/${temp}/${epi}?lang=es`,
        `https://vidbinge.dev/embed/tv/${id}/${temp}/${epi}`
    ];

    let fuenteActual = 0;
    function cargarFuente() {
        if (fuenteActual >= fuentes.length) {
            document.getElementById("cajaReproductor").innerHTML = `<div class="estado">No hay fuente disponible para este episodio</div>`;
            return;
        }
        document.getElementById("cajaReproductor").innerHTML = `<iframe src="${fuentes[fuenteActual]}" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>`;
    }

    cargarFuente();
}

cargarTodo();
</script>

</body>
</html>
