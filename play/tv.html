<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELYX | Serie</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#0a0e27; color:#fff; max-width:960px; margin:0 auto; padding:20px; }
        h1 { color:#4499ff; font-size:32px; margin-bottom:5px; }
        .info { color:#88aaff; font-size:18px; margin-bottom:15px; }
        .reproductor { width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; margin:20px 0; border:2px solid #222b55; }
        video { width:100%; height:100%; }
        .entrada { width:100%; padding:14px; background:#151b40; border:1px solid #2a3470; border-radius:8px; color:#fff; font-size:16px; }
        h3 { margin:25px 0 10px; font-size:22px; }
        p { color:#c9d2ff; line-height:1.6; }
    </style>
</head>
<body>

    <h1 id="titulo">Cargando...</h1>
    <p class="info" id="tempEp"></p>
    <div class="reproductor">
        <video id="video" controls allowfullscreen></video>
    </div>
    <input type="text" id="fuente" class="entrada" placeholder="Pega tu enlace .mp4 / .m3u8 (opcional)">
    <h3>Sinopsis</h3>
    <p id="sinopsis">Obteniendo información...</p>

<script>
const API_KEY = "86694f7126511f241254f76f60820528";
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const t = params.get("t") || "1";
const e = params.get("e") || "1";

async function cargar() {
    if (!id) {
        document.getElementById("titulo").textContent = "Sin ID";
        document.getElementById("sinopsis").textContent = "Usa: ?id=NUMERO&t=1&e=1";
        return;
    }
    try {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=es-ES`);
        if (!res.ok) throw new Error();
        const datos = await res.json();
        document.getElementById("titulo").textContent = datos.name;
        document.getElementById("tempEp").textContent = `Temporada ${t} • Episodio ${e}`;
        document.getElementById("sinopsis").textContent = datos.overview || "Sin sinopsis disponible.";
    } catch {
        document.getElementById("titulo").textContent = "ID no válido";
        document.getElementById("sinopsis").textContent = "Verifica el número en TMDb.";
    }
}

document.getElementById("fuente").addEventListener("input", e => {
    const url = e.target.value.trim();
    if (url) {
        document.getElementById("video").src = url;
        document.getElementById("video").load();
    }
});

cargar();
</script>
</body>
</html>
