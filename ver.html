<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELIVERSET - Reproduciendo</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0e27; color:#fff; max-width:960px; margin:0 auto; padding:20px; text-align:center; }
        h1 { color:#4499ff; margin-bottom:20px; }
        .repro { width:100%; aspect-ratio:16/9; background:#000; border-radius:10px; overflow:hidden; }
        iframe, video { width:100%; height:100%; border:none; }
    </style>
</head>
<body>
    <h1>🌌 TELIVERSET</h1>
    <div class="repro" id="caja"></div>

<script>
const cod = window.location.pathname.split("/")[2];
const base = JSON.parse(localStorage.getItem("teliverset_videos") || "{}");

if (cod && base[cod]) {
    const url = base[cod].url;
    if (url.match(/\.(mp4|mkv|webm)/i)) {
        document.getElementById("caja").innerHTML = `<video src="${url}" controls controlsList="nodownload" allowfullscreen></video>`;
    } else {
        document.getElementById("caja").innerHTML = `<iframe src="${url}" allowfullscreen allow="encrypted-media" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>`;
    }
} else {
    document.querySelector("h1").textContent = "Enlace no encontrado";
}
</script>
</body>
</html>
