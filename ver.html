<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELIVERSET - Reproduciendo</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body { background:#0a0e27; color:#fff; max-width:960px; margin:0 auto; padding:20px; text-align:center; }
    h1 { color:#4499ff; margin-bottom:25px; }
    .reproductor { width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; margin:20px auto; overflow:hidden; }
    video { width:100%; height:100%; border:none; }
  </style>
</head>
<body>
  <h1>🌌 TELIVERSET</h1>
  <div class="reproductor">
    <video id="video" controls allowfullscreen>Tu navegador no soporta el video</video>
  </div>
<script>
const id = window.location.pathname.split("/")[2];
const videos = JSON.parse(localStorage.getItem("videosTeliverset") || "{}");
if (videos[id]) document.getElementById("video").src = videos[id];
else document.querySelector("h1").textContent = "Enlace no válido";
</script>
</body>
</html>
